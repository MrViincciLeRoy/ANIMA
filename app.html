<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ANIMA — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060910;
      --surface: #0d1122;
      --surface2: #121828;
      --border: #1a2540;
      --accent: #4af0c4;
      --accent2: #7b6fff;
      --text: #c8d8f0;
      --muted: #3a4a68;
      --font-d: 'Syne', sans-serif;
      --font-b: 'DM Sans', sans-serif;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      font-size: 14px;
      overflow: hidden;
    }

    .grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(74,240,196,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,240,196,0.03) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    /* ── HEADER ── */
    header {
      position: relative; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      height: 48px; padding: 0 16px;
      background: rgba(6,9,16,0.96);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }
    .logo { font-family: var(--font-d); font-size: 18px; font-weight: 800; letter-spacing: .14em; color:#fff; }
    .logo span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .status {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-d); font-size: 9px; letter-spacing: .18em; color: var(--muted);
    }
    .sdot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
      transition: background .4s, box-shadow .4s;
    }
    .sdot.online  { background: var(--accent); box-shadow: 0 0 7px var(--accent); }
    .sdot.thinking { background: var(--accent2); box-shadow: 0 0 7px var(--accent2); animation: blink .5s infinite; }
    @keyframes blink { 50% { opacity:.15; } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.2;} }
    .logo span { animation: pulse 2s ease-in-out infinite; }

    .disconnect-btn {
      font-family: var(--font-d); font-size: 9px; letter-spacing: .12em;
      color: var(--muted); background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 9px; cursor: pointer; transition: all .2s;
    }
    .disconnect-btn:hover { color: #ff6b6b; border-color: #ff6b6b; }

    /* ── APP BODY ── */
    .app {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      height: calc(100dvh - 48px);
    }

    /* ── AVATAR PANEL ── */
    .avatar-panel {
      flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 0 8px;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }

    .avatar-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 60%, rgba(74,240,196,0.07) 0%, transparent 65%);
      pointer-events: none;
      animation: glowPulse 4s ease-in-out infinite;
    }
    @keyframes glowPulse { 0%,100%{opacity:.7;} 50%{opacity:1;} }

    #avatarCanvas {
      display: block;
      width: 180px; height: 192px;
      position: relative; z-index: 2;
    }

    .expr-strip {
      display: flex; gap: 2px; z-index: 3;
    }
    .expr-btn {
      font-size: 20px; padding: 5px 7px;
      background: none; border: 1px solid transparent;
      border-radius: 8px; cursor: pointer;
      transition: transform .15s, background .15s;
      line-height: 1;
    }
    .expr-btn:active { transform: scale(1.3); background: var(--surface2); border-color: var(--border); }

    .expr-label {
      font-family: var(--font-d); font-size: 8px; letter-spacing: .25em;
      color: var(--accent); opacity: .55; z-index: 3;
    }

    /* ── CHAT ── */
    .chat-panel {
      display: flex; flex-direction: column;
      flex: 1; min-height: 0;
      background: var(--bg);
    }

    .chat-history {
      flex: 1; overflow-y: auto;
      padding: 14px 14px 6px;
      display: flex; flex-direction: column; gap: 10px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    .msg { display: flex; flex-direction: column; gap: 3px; animation: fadeUp .22s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(5px);} to{opacity:1;transform:translateY(0);} }

    .bubble {
      padding: 9px 13px; border-radius: 12px;
      line-height: 1.55; max-width: 86%; font-size: 13px;
    }

    .msg.user  { align-items: flex-end; }
    .msg.user .bubble  { background: var(--surface2); border: 1px solid var(--border); border-bottom-right-radius: 3px; }

    .msg.ai    { align-items: flex-start; }
    .msg.ai .bubble {
      background: linear-gradient(135deg, rgba(74,240,196,0.09), rgba(123,111,255,0.07));
      border: 1px solid rgba(74,240,196,0.2);
      border-bottom-left-radius: 3px; color: #e8f4ff;
    }

    .msg.sys { align-items: center; }
    .msg.sys span { font-size: 11px; color: var(--muted); font-style: italic; text-align: center; }

    .mlabel { font-family: var(--font-d); font-size: 9px; letter-spacing: .18em; color: var(--muted); padding: 0 4px; }

    /* thinking dots */
    .dots span { display:inline-block; animation: dot 1.2s infinite; font-size:18px; }
    .dots span:nth-child(2){animation-delay:.2s;} .dots span:nth-child(3){animation-delay:.4s;}
    @keyframes dot{0%,80%,100%{opacity:.2;transform:translateY(0);}40%{opacity:1;transform:translateY(-4px);}}

    /* ── INPUT BAR ── */
    .input-bar {
      display: flex; align-items: center; gap: 7px;
      padding: 9px 12px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    input[type="text"] {
      flex: 1; min-width: 0;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px;
      color: var(--text); font-family: var(--font-b); font-size: 13px;
      outline: none; transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .send-btn {
      background: var(--accent); border: none; border-radius: 10px;
      color: #060910; font-size: 16px; font-weight: 700;
      width: 42px; height: 42px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .send-btn:active { background: #2de0aa; transform: scale(.96); }
    .send-btn:disabled { opacity: .4; cursor: default; }

    .mute-btn {
      background: none; border: 1px solid var(--border); border-radius: 10px;
      font-size: 16px; width: 42px; height: 42px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s;
    }
    .mute-btn:hover { border-color: var(--accent); }

    /* ── DESKTOP ── */
    @media (min-width: 700px) {
      .app { flex-direction: row; }
      .avatar-panel {
        width: 300px; flex-shrink: 0;
        border-bottom: none; border-right: 1px solid var(--border);
        justify-content: center;
      }
      #avatarCanvas { width: 240px; height: 256px; }
    }
  </style>
</head>
<body>
<div class="grid"></div>

<header>
  <div class="logo">ANIMA<span>●</span></div>
  <div class="header-right">
    <div class="status">
      <span class="sdot" id="sdot"></span>
      <span id="stext">OFFLINE</span>
    </div>
    <button class="disconnect-btn" onclick="disconnect()">✕ KEY</button>
  </div>
</header>

<div class="app">
  <div class="avatar-panel">
    <div class="avatar-glow"></div>
    <canvas id="avatarCanvas" width="300" height="320"></canvas>
    <div class="expr-strip">
      <button class="expr-btn" onclick="setExpression('happy')"    title="Happy">😊</button>
      <button class="expr-btn" onclick="setExpression('sad')"      title="Sad">😢</button>
      <button class="expr-btn" onclick="setExpression('angry')"    title="Angry">😠</button>
      <button class="expr-btn" onclick="setExpression('surprised')" title="Surprised">😲</button>
      <button class="expr-btn" onclick="setExpression('neutral')"  title="Neutral">😐</button>
    </div>
    <div class="expr-label" id="exprLabel">NEUTRAL</div>
  </div>

  <div class="chat-panel">
    <div class="chat-history" id="chatHistory">
      <div class="msg sys"><span>ANIMA is ready. Say something!</span></div>
    </div>
    <div class="input-bar">
      <input type="text" id="userInput" placeholder="Say something…"
             onkeydown="if(event.key==='Enter')sendMessage()"/>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">▶</button>
      <button class="mute-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
    </div>
  </div>
</div>

<script src="avatar.js"></script>
<script src="ai.js"></script>
<script>
  // Redirect to index if no key
  if (!localStorage.getItem('anima_groq_key')) {
    window.location.href = 'index.html';
  }

  function disconnect() {
    if (confirm('Remove API key and return to login?')) {
      localStorage.removeItem('anima_groq_key');
      window.location.href = 'index.html';
    }
  }
</script>
</body>
</html>
